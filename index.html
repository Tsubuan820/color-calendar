<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カレンダーウィジェット</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #4B5563;
            --page-bg: #ffffff;
            --card-bg: #ffffff;
            --text-day: var(--accent);
            --text-muted: color-mix(in srgb, var(--accent) 50%, transparent);
            --day-other: color-mix(in srgb, var(--accent) 28%, transparent);
            --hover-bg: color-mix(in srgb, var(--accent) 10%, transparent);
            --selected-bg: color-mix(in srgb, var(--accent) 20%, transparent);
            --today-text: white;
        }

        [data-theme="dark"] {
            --page-bg: #191919;
            --card-bg: #191919;
            --text-day: color-mix(in srgb, var(--accent) 55%, white);
            --text-muted: color-mix(in srgb, var(--accent) 38%, white);
            --day-other: color-mix(in srgb, var(--accent) 22%, white);
            --hover-bg: color-mix(in srgb, var(--accent) 18%, transparent);
            --selected-bg: color-mix(in srgb, var(--accent) 28%, transparent);
        }

        body {
            font-family: 'Montserrat', 'Noto Sans JP', sans-serif;
            background: var(--page-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 10px;
        }

        .calendar-container {
            max-width: 360px;
            width: 100%;
        }

        .calendar-card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 1rem;
            position: relative;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .month-year {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-day);
            letter-spacing: 0.5px;
        }

        .nav-button {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: var(--text-day);
        }

        .nav-button:hover {
            background: var(--hover-bg);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .day-name {
            text-align: center;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
            padding-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .day {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text-day);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .day:hover:not(.empty):not(.today):not(.selected) {
            background: var(--hover-bg);
        }

        .today {
            background: linear-gradient(45deg, var(--accent), color-mix(in srgb, var(--accent) 60%, white));
            color: var(--today-text);
            font-weight: 600;
        }

        .selected:not(.today) {
            background: var(--selected-bg);
            font-weight: 600;
        }

        .other-month {
            color: var(--day-other);
        }

        .empty {
            cursor: default;
        }

        .gradient-line {
            height: 3px;
            width: 60px;
            background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 50%, white));
            margin: 0 auto 10px auto;
            border-radius: 3px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }

        .calendar-content {
            position: relative;
            z-index: 1;
        }

        /* ボトムバー */
        .bottom-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }

        /* 今日ボタン */
        .today-button {
            background: linear-gradient(45deg, var(--accent), color-mix(in srgb, var(--accent) 60%, white));
            color: var(--today-text);
            border: none;
            padding: 6px 16px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            overflow: hidden;
            position: relative;
            opacity: 0.9;
            font-family: inherit;
        }

        .today-button:hover {
            transform: translateY(-2px);
            opacity: 1;
        }

        .today-button:active {
            transform: translateY(0);
        }

        .today-button svg {
            width: 12px;
            height: 12px;
            margin-right: 6px;
        }

        @keyframes ripple {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(10); opacity: 0; }
        }

        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            width: 10px;
            height: 10px;
            animation: ripple 0.8s ease-out;
            pointer-events: none;
        }

        /* アイコンボタン共通（カラー・モード切替） */
        .icon-button {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            background: var(--hover-bg);
        }

        .icon-button:hover {
            transform: scale(1.12);
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }

        /* カラースウォッチ */
        .color-swatch-wrapper {
            position: relative;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid rgba(128,128,128,0.15);
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .color-swatch-wrapper:hover {
            transform: scale(1.12);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .color-swatch-wrapper input[type="color"] {
            position: absolute;
            inset: -4px;
            width: calc(100% + 8px);
            height: calc(100% + 8px);
            opacity: 0;
            cursor: pointer;
            border: none;
            padding: 0;
        }

        .color-swatch-bg {
            position: absolute;
            inset: 0;
            background: var(--accent);
            pointer-events: none;
        }

        /* モード切替ボタン */
        .mode-button {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            background: var(--hover-bg);
            color: var(--text-day);
        }

        .mode-button:hover {
            transform: scale(1.12);
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }

        .mode-button svg {
            width: 14px;
            height: 14px;
        }

        .icon-sun { display: block; }
        .icon-moon { display: none; }
        [data-theme="dark"] .icon-sun { display: none; }
        [data-theme="dark"] .icon-moon { display: block; }
    </style>
</head>
<body>
    <div class="calendar-container">
        <div class="calendar-card">
            <div class="text-center">
                <div class="gradient-line"></div>
            </div>

            <div class="calendar-content fade-in">
                <div class="calendar-header">
                    <button class="nav-button" id="prev-month">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 18l-6-6 6-6"></path>
                        </svg>
                    </button>
                    <div class="month-year" id="month-year"></div>
                    <button class="nav-button" id="next-month">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 18l6-6-6-6"></path>
                        </svg>
                    </button>
                </div>

                <div class="calendar-grid" id="day-names">
                    <div class="day-name">日</div>
                    <div class="day-name">月</div>
                    <div class="day-name">火</div>
                    <div class="day-name">水</div>
                    <div class="day-name">木</div>
                    <div class="day-name">金</div>
                    <div class="day-name">土</div>
                </div>

                <div class="calendar-grid" id="calendar-days"></div>
            </div>

            <div class="bottom-bar">
                <button id="today-button" class="today-button">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    今日
                </button>

                <div class="color-swatch-wrapper" title="色を選ぶ">
                    <div class="color-swatch-bg"></div>
                    <input type="color" id="accent-color-picker" value="#4B5563">
                </div>

                <button class="mode-button" id="mode-toggle" title="ライト / ダーク切替">
                    <svg class="icon-sun" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="5" stroke-width="2"></circle>
                        <path stroke-width="2" stroke-linecap="round" d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                    </svg>
                    <svg class="icon-moon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const monthNames = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
            let currentDate = new Date();
            let currentMonth = currentDate.getMonth();
            let currentYear = currentDate.getFullYear();

            const calendarDays = document.getElementById('calendar-days');
            const monthYear = document.getElementById('month-year');
            const prevMonthBtn = document.getElementById('prev-month');
            const nextMonthBtn = document.getElementById('next-month');
            const todayBtn = document.getElementById('today-button');
            const colorPicker = document.getElementById('accent-color-picker');
            const swatchBg = document.querySelector('.color-swatch-bg');
            const modeToggle = document.getElementById('mode-toggle');

            function getLuminance(hex) {
                const r = parseInt(hex.slice(1,3), 16) / 255;
                const g = parseInt(hex.slice(3,5), 16) / 255;
                const b = parseInt(hex.slice(5,7), 16) / 255;
                return 0.2126 * r + 0.7152 * g + 0.0722 * b;
            }

            function updateTodayText() {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                const lum = getLuminance(colorPicker.value);
                // ライトモード: 常にwhite（白背景だから丸は暗くなる）
                // ダークモード: 明るい色を選んだときだけ暗い文字に
                document.documentElement.style.setProperty(
                    '--today-text',
                    (isDark && lum > 0.35) ? '#1a1a1a' : 'white'
                );
            }

            function setAccentColor(hex) {
                document.documentElement.style.setProperty('--accent', hex);
                swatchBg.style.background = hex;
                colorPicker.value = hex;
                updateTodayText();
                localStorage.setItem('cal-accent', hex);
            }

            function setTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                updateTodayText();
                localStorage.setItem('cal-theme', theme);
            }

            colorPicker.addEventListener('input', function() {
                setAccentColor(this.value);
            });

            // 保存済みの色・テーマを復元
            const savedAccent = localStorage.getItem('cal-accent');
            const savedTheme = localStorage.getItem('cal-theme');
            if (savedAccent) setAccentColor(savedAccent);

            // テーマ: 保存済み → OS設定 の優先順で適用
            const mq = window.matchMedia('(prefers-color-scheme: dark)');
            if (savedTheme) {
                setTheme(savedTheme);
            } else {
                setTheme(mq.matches ? 'dark' : 'light');
                mq.addEventListener('change', e => setTheme(e.matches ? 'dark' : 'light'));
            }

            modeToggle.addEventListener('click', function() {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                setTheme(isDark ? 'light' : 'dark');
            });

            function generateCalendar(month, year) {
                monthYear.textContent = `${year}年 ${monthNames[month]}`;
                calendarDays.innerHTML = '';

                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const prevMonthLastDay = new Date(year, month, 0).getDate();
                const firstDayOfWeek = firstDay.getDay();

                for (let i = firstDayOfWeek - 1; i >= 0; i--) {
                    const el = document.createElement('div');
                    el.classList.add('day', 'other-month');
                    el.textContent = prevMonthLastDay - i;
                    calendarDays.appendChild(el);
                }

                const today = new Date();
                for (let i = 1; i <= lastDay.getDate(); i++) {
                    const el = document.createElement('div');
                    el.classList.add('day');
                    el.textContent = i;

                    if (i === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                        el.classList.add('today');
                    }

                    el.addEventListener('click', function() {
                        const isToday = this.classList.contains('today');
                        document.querySelectorAll('.day').forEach(d => {
                            if (!d.classList.contains('today')) d.classList.remove('selected');
                        });
                        if (!isToday) this.classList.add('selected');
                    });

                    calendarDays.appendChild(el);
                }

                const totalDaysShown = firstDayOfWeek + lastDay.getDate();
                const cellsToFill = (Math.ceil(totalDaysShown / 7) * 7) - totalDaysShown;
                for (let i = 1; i <= cellsToFill; i++) {
                    const el = document.createElement('div');
                    el.classList.add('day', 'other-month');
                    el.textContent = i;
                    calendarDays.appendChild(el);
                }
            }

            prevMonthBtn.addEventListener('click', function() {
                currentMonth--;
                if (currentMonth < 0) { currentMonth = 11; currentYear--; }
                generateCalendar(currentMonth, currentYear);
            });

            nextMonthBtn.addEventListener('click', function() {
                currentMonth++;
                if (currentMonth > 11) { currentMonth = 0; currentYear++; }
                generateCalendar(currentMonth, currentYear);
            });

            todayBtn.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                const rect = this.getBoundingClientRect();
                ripple.style.left = `${e.clientX - rect.left}px`;
                ripple.style.top = `${e.clientY - rect.top}px`;
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 800);
                const now = new Date();
                currentMonth = now.getMonth();
                currentYear = now.getFullYear();
                generateCalendar(currentMonth, currentYear);
            });

            generateCalendar(currentMonth, currentYear);
        });
    </script>
</body>
</html>
