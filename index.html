<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カレンダーウィジェット ジェネレーター</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', 'Noto Sans JP', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            color: #374151;
        }

        .page {
            max-width: 480px;
            margin: 0 auto;
            padding: 48px 20px 64px;
        }

        /* ヘッダー */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #374151;
            margin-bottom: 6px;
        }

        .header p {
            font-size: 0.72rem;
            color: #9CA3AF;
            letter-spacing: 0.5px;
        }

        /* 設定パネル（1枚のカード） */
        .settings-card {
            background: white;
            border-radius: 14px;
            padding: 20px 20px 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* カラースウォッチ */
        .color-swatch-wrapper {
            position: relative;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.08);
            overflow: hidden;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .color-swatch-wrapper:hover {
            transform: scale(1.08);
            box-shadow: 0 3px 12px rgba(0,0,0,0.15);
        }

        .color-swatch-bg {
            position: absolute;
            inset: 0;
            background: #4B5563;
            pointer-events: none;
        }

        .color-swatch-wrapper input[type="color"] {
            position: absolute;
            inset: -6px;
            width: calc(100% + 12px);
            height: calc(100% + 12px);
            opacity: 0;
            cursor: pointer;
            border: none;
            padding: 0;
        }

        .color-hex-input {
            font-size: 0.85rem;
            font-weight: 500;
            color: #374151;
            letter-spacing: 1px;
            font-family: 'Montserrat', monospace;
            width: 88px;
            border: none;
            background: transparent;
            outline: none;
            cursor: text;
            padding: 2px 0;
            border-bottom: 1.5px solid #D1D5DB;
            transition: border-color 0.2s;
        }

        .color-hex-input:focus {
            border-bottom-color: #374151;
        }

        /* テーマトグル */
        .theme-toggle {
            margin-left: auto;
            display: flex;
            background: #F3F4F6;
            border-radius: 10px;
            padding: 3px;
            gap: 3px;
        }

        .theme-btn {
            padding: 7px 14px;
            border-radius: 8px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.75rem;
            font-weight: 500;
            color: #9CA3AF;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .theme-btn svg { width: 13px; height: 13px; }

        .theme-btn.active-light {
            background: white;
            color: #374151;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }

        .theme-btn.active-dark {
            background: #1F2937;
            color: white;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }

        /* プレビュー */
        .preview-card {
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .preview-bar {
            background: #E5E7EB;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .preview-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #D1D5DB;
        }

        .preview-bar-label {
            font-size: 0.62rem;
            color: #9CA3AF;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            margin-left: 4px;
        }

        iframe {
            width: 100%;
            height: 370px;
            border: none;
            display: block;
            overflow: hidden;
        }

        /* URL + コピー */
        .url-area {
            background: white;
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .url-box {
            flex: 1;
            font-size: 0.68rem;
            font-family: 'Montserrat', monospace;
            color: #6B7280;
            word-break: break-all;
            line-height: 1.6;
        }

        .copy-btn {
            flex-shrink: 0;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: none;
            background: #374151;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .copy-btn:hover { background: #1F2937; }
        .copy-btn.copied { background: #059669; }
        .copy-btn svg { width: 13px; height: 13px; }

        /* フッター */
        .footer {
            text-align: center;
            font-size: 0.72rem;
            color: #9CA3AF;
        }

        .footer .heart { color: #e53935; }

        .footer a {
            color: #9CA3AF;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover { color: #4a90d9; }
    </style>
</head>
<body>
    <div class="page">

        <div class="header">
            <h1>CALENDAR WIDGET GENERATOR</h1>
        </div>

        <!-- 設定（1枚） -->
        <div class="settings-card">
            <div class="color-swatch-wrapper">
                <div class="color-swatch-bg" id="gen-swatch-bg"></div>
                <input type="color" id="gen-color-picker" value="#4B5563">
            </div>
            <input type="text" class="color-hex-input" id="gen-color-hex" value="#4B5563" maxlength="7" spellcheck="false">

            <div class="theme-toggle">
                <button class="theme-btn active-light" id="btn-light">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="5" stroke-width="2"/>
                        <path stroke-width="2" stroke-linecap="round" d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                    Light
                </button>
                <button class="theme-btn" id="btn-dark">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                    </svg>
                    Dark
                </button>
            </div>
        </div>

        <!-- プレビュー -->
        <div class="preview-card">
            <div class="preview-bar">
                <div class="preview-dot"></div>
                <div class="preview-dot"></div>
                <div class="preview-dot"></div>
                <span class="preview-bar-label">Preview</span>
            </div>
            <iframe id="preview-frame" src="widget.html?accent=%234B5563&theme=light" scrolling="no"></iframe>
        </div>

        <!-- URL + コピー -->
        <div class="url-area">
            <div class="url-box" id="gen-url"></div>
            <button class="copy-btn" id="copy-btn">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="15" height="15">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                </svg>
            </button>
        </div>

        <footer class="footer">
            Made with <span class="heart">♥</span> by <a href="https://x.com/tsubuan_sun" target="_blank">Tsubuan</a> © 2026
        </footer>

    </div>

    <script>
        const colorPicker  = document.getElementById('gen-color-picker');
        const swatchBg     = document.getElementById('gen-swatch-bg');
        const colorHex     = document.getElementById('gen-color-hex');
        const btnLight     = document.getElementById('btn-light');
        const btnDark      = document.getElementById('btn-dark');
        const previewFrame = document.getElementById('preview-frame');
        const urlBox       = document.getElementById('gen-url');
        const copyBtn      = document.getElementById('copy-btn');
        const copyLabel    = document.getElementById('copy-label');

        let currentAccent = '#4B5563';
        let currentTheme  = 'light';

        const BASE_URL = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '/') + 'widget.html';

        function buildUrl() {
            return `${BASE_URL}?accent=${encodeURIComponent(currentAccent)}&theme=${currentTheme}`;
        }

        function update() {
            swatchBg.style.background = currentAccent;
            colorHex.value = currentAccent.toUpperCase();
            colorPicker.value = currentAccent;
            urlBox.textContent = buildUrl();
            previewFrame.src = buildUrl();
        }

        // カラーピッカーで選択
        colorPicker.addEventListener('input', function() {
            currentAccent = this.value;
            update();
        });

        // HEXコードを直接入力
        colorHex.addEventListener('input', function() {
            let val = this.value.trim();
            if (!val.startsWith('#')) val = '#' + val;
            if (/^#[0-9a-fA-F]{6}$/.test(val)) {
                currentAccent = val;
                swatchBg.style.background = val;
                colorPicker.value = val;
                urlBox.textContent = buildUrl();
                previewFrame.src = buildUrl();
            }
        });

        colorHex.addEventListener('blur', function() {
            // フォーカスが外れたら現在の正しい値に揃える
            this.value = currentAccent.toUpperCase();
        });

        btnLight.addEventListener('click', () => {
            currentTheme = 'light';
            btnLight.classList.add('active-light');
            btnLight.classList.remove('active-dark');
            btnDark.classList.remove('active-light', 'active-dark');
            update();
        });

        btnDark.addEventListener('click', () => {
            currentTheme = 'dark';
            btnDark.classList.add('active-dark');
            btnDark.classList.remove('active-light');
            btnLight.classList.remove('active-light', 'active-dark');
            update();
        });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(buildUrl()).then(() => {
                copyBtn.classList.add('copied');
                copyBtn.innerHTML = `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="15" height="15"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>`;
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyBtn.innerHTML = `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="15" height="15"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>`;
                }, 2000);
            });
        });

        update();
    </script>
</body>
</html>
